name: Amazon Egypt Scraper

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  # ── Job A: mobile, laptops, TVs, fridges, washing machines ──────────────────
  scrape-A:
    name: Scrape Group A
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider (Group A)
        run: PYTHONPATH=$GITHUB_WORKSPACE scrapy crawl amazon_eg -a group=A -O products_A.json

      - name: Upload Group A results
        uses: actions/upload-artifact@v4
        with:
          name: products-A
          path: products_A.json

  # ── Job B: AC, headphones, cameras, tablets, gaming ─────────────────────────
  scrape-B:
    name: Scrape Group B
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider (Group B)
        run: PYTHONPATH=$GITHUB_WORKSPACE scrapy crawl amazon_eg -a group=B -O products_B.json

      - name: Upload Group B results
        uses: actions/upload-artifact@v4
        with:
          name: products-B
          path: products_B.json

  # ── Merge: combine A + B and commit ─────────────────────────────────────────
  merge-and-commit:
    name: Merge & Commit
    runs-on: ubuntu-latest
    needs: [scrape-A, scrape-B]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Group A results
        uses: actions/download-artifact@v4
        with:
          name: products-A

      - name: Download Group B results
        uses: actions/download-artifact@v4
        with:
          name: products-B

      - name: Merge JSON files
        run: |
          python - <<'EOF'
          import json, os

          merged = []
          for fname in ["products_A.json", "products_B.json"]:
              if os.path.exists(fname):
                  with open(fname, encoding="utf-8") as f:
                      data = json.load(f)
                      merged.extend(data)
                      print(f"{fname}: {len(data)} products")

          with open("products_full_data.json", "w", encoding="utf-8") as f:
              json.dump(merged, f, ensure_ascii=False, indent=4)

          print(f"Total merged: {len(merged)} products")
          EOF

      - name: Show summary
        run: |
          echo "Scraping completed!"
          echo "Total products: $(python -c "import json; print(len(json.load(open('products_full_data.json'))))")"

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add products_full_data.json
          git diff --cached --quiet || git commit -m "Auto-update: Amazon products $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
