name: Amazon Egypt Scraper

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  # ── 10 parallel scrape jobs (one category each) ───────────────────────────
  scrape:
    name: Scrape Group ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        group: [A, B, C, D, E, F, G, H, I, J]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider (Group ${{ matrix.group }})
        run: PYTHONPATH=$GITHUB_WORKSPACE scrapy crawl amazon_eg -a group=${{ matrix.group }} -O products_${{ matrix.group }}.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: products-${{ matrix.group }}
          path: products_${{ matrix.group }}.json

  # ── Merge all groups and commit ───────────────────────────────────────────
  merge-and-commit:
    name: Merge & Commit
    runs-on: ubuntu-latest
    needs: scrape
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: products-*
          merge-multiple: true

      - name: Merge JSON files
        run: |
          python - <<'EOF'
          import json, glob, os

          merged = []
          for fname in sorted(glob.glob("products_*.json")):
              if os.path.exists(fname):
                  with open(fname, encoding="utf-8") as f:
                      data = json.load(f)
                      merged.extend(data)
                      print(f"{fname}: {len(data)} products")

          with open("products_full_data.json", "w", encoding="utf-8") as f:
              json.dump(merged, f, ensure_ascii=False, indent=4)

          print(f"\nTotal merged: {len(merged)} products")
          EOF

      - name: Show summary
        run: |
          echo "Scraping completed!"
          echo "Total products: $(python -c "import json; print(len(json.load(open('products_full_data.json'))))")"

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add products_full_data.json
          git diff --cached --quiet || git commit -m "Auto-update: Amazon products $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
