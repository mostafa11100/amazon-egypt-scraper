name: Amazon Egypt Scraper

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  # ── 10 parallel scrape jobs (one category each) ───────────────────────────
  scrape:
    name: Scrape Group ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        group: [A, B, C, D, E, F, G, H, I, J]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spider (Group ${{ matrix.group }})
        run: PYTHONPATH=$GITHUB_WORKSPACE scrapy crawl amazon_eg -a group=${{ matrix.group }} -O products_${{ matrix.group }}.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: products-${{ matrix.group }}
          path: products_${{ matrix.group }}.json

  # ── Merge all groups → CSV → download ────────────────────────────────────
  merge-and-export:
    name: Merge & Export CSV
    runs-on: ubuntu-latest
    needs: scrape
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: products-*
          merge-multiple: true

      - name: Merge JSON → CSV
        run: |
          python - <<'EOF'
          import json, glob, os, csv

          # Merge all JSON files
          merged = []
          for fname in sorted(glob.glob("products_*.json")):
              with open(fname, encoding="utf-8") as f:
                  data = json.load(f)
                  merged.extend(data)
                  print(f"{fname}: {len(data)} products")

          print(f"\nTotal: {len(merged)} products")

          # Write CSV (flatten nested fields)
          columns = [
              "asin", "title", "brand", "category", "price_egp",
              "rating", "reviews_count", "availability",
              "shipping_price", "prime_eligible", "ships_from", "sold_by", "delivery_date",
              "main_image", "all_images", "description",
              "tech_specs", "variations", "product_url"
          ]

          with open("amazon_products.csv", "w", encoding="utf-8-sig", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=columns, extrasaction="ignore")
              writer.writeheader()
              for item in merged:
                  item["all_images"] = " | ".join(item.get("all_images", []))
                  item["tech_specs"] = json.dumps(item.get("tech_specs", {}), ensure_ascii=False)
                  item["variations"] = json.dumps(item.get("variations", {}), ensure_ascii=False)
                  writer.writerow(item)

          print("CSV saved: amazon_products.csv")
          EOF

      - name: Upload CSV for download
        uses: actions/upload-artifact@v4
        with:
          name: amazon-products-csv
          path: amazon_products.csv
          retention-days: 30
